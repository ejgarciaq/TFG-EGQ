{% extends "base.html" %}

{% block title %} - Editar Feriado{% endblock %}

{% block content %}
<div class="container">
    <h4 class="text-center mb-4">Editar Feriado</h1>

    <div class="card shadow mx-auto" style="max-width: 500px;">
        <div class="card-header bg-warning text-white">
            Editar Feriado: {{ feriado.fecha_feriado.strftime('%Y-%m-%d') }}
        </div>
        <div class="card-body">
            <form action="{{ url_for('feriado.editar_feriado', id_feriado=feriado.id_feriado) }}" method="POST">
                <div class="mb-3">
                    <label for="fecha_feriado" class="form-label">Fecha del Feriado</label>
                    <input type="date" class="form-control" id="fecha_feriado" name="fecha_feriado" value="{{ feriado.fecha_feriado.strftime('%Y-%m-%d') }}" required>
                </div>
                <div class="mb-3">
                    <label for="descripcion_feriado" class="form-label">Descripción del Feriado</label>
                    <input type="text" class="form-control" id="descripcion_feriado" name="descripcion_feriado" value="{{ feriado.descripcion_feriado }}" required>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" name="pago_obligatorio" id="pago_obligatorio" {% if feriado.pago_obligatorio %}checked{% endif %}>
                    <label class="form-check-label" for="pago_obligatorio">
                        ¿Es de pago obligatorio?
                    </label>
                </div>
                <button type="submit" class="btn btn-warning w-100">Guardar Cambios</button>
                <a href="{{ url_for('feriado.listar_feriados') }}" class="btn btn-secondary w-100 mt-2">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
