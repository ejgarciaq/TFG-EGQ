<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Asistencia</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Registro de Asistencia</h1>
        <div class="card">
            <div id="reloj" class="reloj"></div>
            <p><strong>Fecha Actual:</strong> <span id="fecha_actual"></span></p>
            
            <form id="form_asistencia" method="POST" action="{{ url_for('asistencia.registrar') }}">
                <input type="hidden" name="hora_entrada" id="hora_entrada_input">
                <button type="submit" id="marcar_btn">Marcar Entrada/Salida</button>
            </form>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/asistencia.js') }}"></script>
</body>
</html>
