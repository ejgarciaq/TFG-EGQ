{% extends 'base.html' %}
{% block title %}Registro de Asistencia{% endblock %}
{% block content %}
<div class="container-flex" data-estado-actual="{{ estado_actual }}"> {# Añade esto aquí #}
    <div class="card p-4 shadow">
        <fieldset class="card-body text-center border border-2 border-primary rounded-3">
            <legend class="float-none w-auto px-1 fs-3"><i class="fa-solid fa-clock"></i> Registro de Asistencia</legend>
            <p class="mt-3 fs-4"><strong>Fecha:</strong> <span id="fecha_actual"></span></p>

            <div id="reloj" class="bg-dark text-light reloj rounded-3 d-inline-block fw-bold "></div>

            <form id="form_asistencia" method="POST" action="{{ url_for('registro_asistencia.registrar_asistencia') }}" class="mt-4">

                <button type="submit" id="marcar_btn" name="accion" value="" class="btn btn-primary btn-lg">
                    <i id="btn_icon" class="fas fa-clock"></i> <span id="btn_text">Cargando...</span>
                </button>
            </form>
        </fieldset>
    </div>
</div>

{% endblock %}
