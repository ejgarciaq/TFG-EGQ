{% extends 'base.html' %}

{% block title %}Editar Empleado{% endblock %}

{% block content %}
<div class="container">
    <h4 class="text-center">Editar Empleado</h4>
    
    <form method="POST" action="{{ url_for('empleado.editar_empleado', id=empleado.id_empleado) }}">
        <fieldset class="shadow border p-2 mb-0 rounded border-primary">
            <legend class="float-none w-auto px-1 fs-5">Datos de Usuario</legend>
            <div class="row">
                <div class="col-md-3 mb-3">
                    <label for="username" class="form-label">Nombre de Usuario</label>
                    <input type="text" class="form-control" id="username" name="username" value="{{ empleado.usuario.username }}" required readonly>
                </div>
                
                <div class="col-md-3 mb-3">
                    <label for="rol_id" class="form-label">Rol</label>
                    <select class="form-control" id="rol_id" name="rol_id" required>
                        {% for rol in roles %}
                        <option value="{{ rol.id_rol }}" {% if rol.id_rol == empleado.usuario.Rol_id_rol %}selected{% endif %}>
                            {{ rol.tipo_rol }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3 mb-3 d-flex align-items-end">
                    <button type="submit" class="btn btn-warning w-100" name="action" value="restablecer_contrasena">Restablecer Contraseña</button>
                </div>
                
                <div class="col-md-3 mb-3 d-flex align-items-end">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="estado_usuario" name="estado_usuario" {% if empleado.usuario.estado_usuario %}checked{% endif %}>
                        <label class="form-check-label" for="estado_usuario">Estado del Usuario</label>
                    </div>
                </div>
            </div>
        </fieldset>      
        
        <fieldset class="shadow border p-2 mb-0 rounded border-primary mt-3">
            <legend class="float-none w-auto px-2 fs-5">Datos de Empleado</legend>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="nombre" name="nombre" value="{{ empleado.nombre }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="apellido_primero" class="form-label">Primer Apellido</label>
                    <input type="text" class="form-control" id="apellido_primero" name="apellido_primero" value="{{ empleado.apellido_primero }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="apellido_segundo" class="form-label">Segundo Apellido</label>
                    <input type="text" class="form-control" id="apellido_segundo" name="apellido_segundo" value="{{ empleado.apellido_segundo }}">
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="cedula" class="form-label">Cédula</label>
                    <input type="text" class="form-control" id="cedula" pattern="\d{9}" placeholder="123456789" title="La cédula debe tener exactamente 9 números" name="cedula" value="{{ empleado.cedula }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="correo" class="form-label">Correo</label>
                    <input type="email" class="form-control" id="correo" name="correo" placeholder="ejemplo@correo.com" value="{{ empleado.correo }}" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="telefono" class="form-label">Teléfono</label>
                    <input type="tel"  class="form-control" id="telefono" name="telefono" pattern="[0-9]{8}" placeholder="88888888" title="El teléfono debe tener exactamente 8 números" value="{{ empleado.telefono }}" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label for="salario_base" class="form-label" for="inlineFormInputGroupUsername">Salario Base</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <div class="input-group-text">₡</div>
                        </div>
                        <input type="number" step="0.01" class="form-control" id="salario_base" name="salario_base" value="{{ empleado.salario_base }}" required>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="fecha_ingreso" class="form-label">Fecha de Ingreso</label>
                    <input type="date" class="form-control" id="fecha_ingreso" name="fecha_ingreso" value="{{ empleado.fecha_ingreso.isoformat() }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="fecha_salida" class="form-label">Fecha de Salida</label>
                    <input type="date" class="form-control" id="fecha_salida" name="fecha_salida" value="{% if empleado.fecha_salida %}{{ empleado.fecha_salida.isoformat() }}{% endif %}">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="puesto_id" class="form-label">Puesto</label>
                    <select class="form-control select2" id="puesto_id" name="puesto_id" required>
                        {% for puesto in puestos %}
                        <option value="{{ puesto.id_puesto }}" {% if puesto.id_puesto == empleado.Puesto_id_puesto %}selected{% endif %}>
                            {{ puesto.tipo_puesto }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="tipo_nomina_id" class="form-label">Tipo de Nómina</label>
                    <select class="form-control" id="tipo_nomina_id" name="tipo_nomina_id" required>
                        {% for tipo in tipos_nomina %}
                        <option value="{{ tipo.id_tipo_nomina }}" {% if tipo.id_tipo_nomina == empleado.TipoNomina_id_tipo_nomina %}selected{% endif %}>
                            {{ tipo.nombre_tipo }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class=" col-md-3 ms-3 form-check">
                <input type="checkbox" class="form-check-input" id="estado_empleado" name="estado_empleado" {% if empleado.estado_empleado %}checked{% endif %}>
                <label class="form-check-label" for="estado_empleado">Estado del Empleado</label>
            </div>
        </fieldset>

        <div class="mt-2">
           <button type="submit" class="btn btn-primary" name="action" value="guardar_cambios">Guardar Cambios</button>
           <a href="{{ url_for('empleado.listar_empleado') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>

{% endblock %}
