{% extends 'base.html' %}

{% block title %}Roles{% endblock %}

{% block content %}
<div class="container mt-4" style="margin-left: 250px; padding: 20px;">
    <h2>Listado de Roles</h2>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <a href="{{ url_for('rol.crear_rol') }}" class="btn btn-primary">
            Crear Rol
        </a>
    </div>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre del Rol</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for rol in roles %}
            <tr>
                <td>{{ rol.id_rol }}</td>
                <td>{{ rol.tipo_rol }}</td>
                <td>
                    <a href="{{ url_for('rol.editar_rol', id=rol.id_rol) }}" class="btn btn-sm btn-warning">Editar</a>
                    <form action="{{ url_for('rol.eliminar_rol', id=rol.id_rol) }}" method="POST" style="display:inline;">
                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('¿Estás seguro de que quieres eliminar este rol?');">Eliminar</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
