{% extends 'base.html' %}
{% block title %} - Crear Puesto{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <fieldset class="shadow border p-2 mb-0 rounded border-primary">
            <legend class="float-none w-auto px-1 fs-3 text-center fw-bold">Crear un Nuevo Puesto</legend>
                <form method="POST" action="{{ url_for('puesto.crear_puesto') }}">
                    <div class="mb-3">
                        <label for="tipo_puesto" class="form-label fw-bold">Nombre del Puesto</label>
                        <input type="text" class="form-control fw-semibold" id="tipo_puesto" name="tipo_puesto" required>
                    </div>
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-primary fw-bold"><i class="fa-solid fa-floppy-disk"></i> Guardar</button>
                        <a href="{{ url_for('puesto.listar_puestos') }}" class="btn btn-secondary fw-bold"><i class="fa-solid fa-arrow-left"></i> Volver</a>
                    </div>
                </form>
            </fieldset>
        </div>
    </div>
</div>
{% endblock %}
