<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Olvidó su Contraseña? - Payroll App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body class="forgot-password-body">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg p-4 custom-card">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">
                    <i class="fas fa-lock me-2"></i> ¿Olvidó su Contraseña?
                </h2>

                <p class="text-center mb-4">
                    Para restablecer su contraseña, por favor, contacte al administrador del sistema.
                    Él le generará una nueva contraseña temporal.
                </p>

                <div class="text-center mt-4">
                    <a href="{{ url_for('auth.login') }}" class="btn btn-outline-primary">
                        <i class="fas fa-arrow-left me-2"></i> Volver al Inicio de Sesión
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
</body>
</html>
